<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petrichor Agent Demo</title>
    <style>
      :root {
        --bg: #f4efe7;
        --panel: rgba(255, 252, 247, 0.88);
        --border: rgba(71, 54, 42, 0.18);
        --ink: #2c241d;
        --muted: #766657;
        --accent: #0e7c66;
        --accent-2: #d88c33;
        --user: #ead7c2;
        --assistant: #d8efe8;
        --shadow: 0 20px 50px rgba(65, 50, 38, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Avenir Next", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(216, 140, 51, 0.16), transparent 34%),
          radial-gradient(circle at top right, rgba(14, 124, 102, 0.12), transparent 32%),
          linear-gradient(180deg, #faf5ed 0%, var(--bg) 100%);
      }

      .shell {
        width: min(1200px, calc(100vw - 32px));
        margin: 32px auto;
        display: grid;
        gap: 18px;
      }

      .hero,
      .workspace {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .hero {
        padding: 28px;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 0.95;
        letter-spacing: -0.06em;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        max-width: 760px;
        font-size: 1rem;
      }

      .workspace {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        overflow: hidden;
      }

      .panel {
        padding: 24px;
      }

      .panel + .panel {
        border-left: 1px solid var(--border);
      }

      .toolbar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 18px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(14, 124, 102, 0.08);
        color: var(--accent);
        font-size: 0.9rem;
      }

      .thread-id {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.82rem;
      }

      button,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 14px;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 140ms ease, opacity 140ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .primary {
        background: linear-gradient(135deg, var(--accent) 0%, #0d6353 100%);
        color: white;
      }

      .secondary {
        background: rgba(216, 140, 51, 0.14);
        color: #8b5717;
      }

      .chat-log,
      .events-log {
        min-height: 420px;
        max-height: 60vh;
        overflow: auto;
        display: grid;
        gap: 12px;
        padding-right: 4px;
      }

      .bubble {
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid var(--border);
        white-space: pre-wrap;
      }

      .bubble.user {
        background: var(--user);
      }

      .bubble.assistant {
        background: var(--assistant);
      }

      .bubble small {
        display: block;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.68rem;
        color: var(--muted);
      }

      textarea {
        width: 100%;
        min-height: 110px;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 18px;
        resize: vertical;
        background: rgba(255, 255, 255, 0.72);
      }

      .composer {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .events-log {
        background: rgba(31, 26, 22, 0.96);
        color: #efe8de;
        border-radius: 18px;
        padding: 16px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;
      }

      .event-line {
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .summary {
        margin-top: 18px;
        padding: 16px;
        border: 1px dashed var(--border);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.6);
      }

      .summary h2,
      .panel h2 {
        margin: 0 0 12px;
        font-size: 1rem;
        letter-spacing: 0.02em;
      }

      @media (max-width: 900px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .panel + .panel {
          border-left: 0;
          border-top: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1>Petrichor Agent</h1>
        <p>
          Minimal local-agent harness with LangGraph orchestration, LiteLLM routing,
          AG-UI-compatible streaming, durable thread memory, analytics, and traces.
        </p>
      </section>

      <section class="workspace">
        <section class="panel">
          <div class="toolbar">
            <button id="new-thread" class="primary">Create Thread</button>
            <button id="reload-thread" class="secondary" disabled>Reload Thread</button>
            <span class="badge">
              <span>Status</span>
              <strong id="status">Idle</strong>
            </span>
            <span class="badge thread-id" id="thread-id">No thread yet</span>
          </div>

          <div id="chat-log" class="chat-log"></div>

          <div class="summary">
            <h2>Rolling Summary</h2>
            <div id="summary-text">No summary yet.</div>
          </div>

          <div class="composer">
            <textarea
              id="message"
              placeholder="Send a message to the local model..."
            ></textarea>
            <button id="send" class="primary" disabled>Stream Run</button>
          </div>
        </section>

        <section class="panel">
          <h2>AG-UI Event Stream</h2>
          <div id="events-log" class="events-log"></div>
        </section>
      </section>
    </main>

    <script>
      const state = {
        threadId: null,
        activeAssistantMessageId: null,
        assistantNode: null,
      };

      const elements = {
        newThread: document.getElementById("new-thread"),
        reloadThread: document.getElementById("reload-thread"),
        send: document.getElementById("send"),
        status: document.getElementById("status"),
        threadId: document.getElementById("thread-id"),
        chatLog: document.getElementById("chat-log"),
        eventsLog: document.getElementById("events-log"),
        message: document.getElementById("message"),
        summaryText: document.getElementById("summary-text"),
      };

      elements.newThread.addEventListener("click", createThread);
      elements.reloadThread.addEventListener("click", refreshThread);
      elements.send.addEventListener("click", sendMessage);

      async function createThread() {
        setStatus("Creating thread...");
        const response = await fetch("/threads", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ metadata: { source: "demo-client" } }),
        });
        const data = await response.json();
        state.threadId = data.thread_id;
        elements.threadId.textContent = state.threadId;
        elements.send.disabled = false;
        elements.reloadThread.disabled = false;
        elements.chatLog.innerHTML = "";
        elements.eventsLog.innerHTML = "";
        elements.summaryText.textContent = data.summary || "No summary yet.";
        setStatus("Ready");
      }

      async function refreshThread() {
        if (!state.threadId) return;
        const response = await fetch(`/threads/${state.threadId}`);
        const data = await response.json();
        elements.chatLog.innerHTML = "";
        data.messages.forEach((message) => appendBubble(message.role, message.content));
        elements.summaryText.textContent = data.summary || "No summary yet.";
        setStatus("Thread reloaded");
      }

      async function sendMessage() {
        if (!state.threadId) return;
        const userMessage = elements.message.value.trim();
        if (!userMessage) return;

        appendBubble("user", userMessage);
        elements.message.value = "";
        setStatus("Streaming...");
        state.activeAssistantMessageId = null;
        state.assistantNode = null;

        const response = await fetch(`/threads/${state.threadId}/runs/stream`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            user_message: userMessage,
            metadata: { source: "demo-client" },
          }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop() || "";
          for (const part of parts) {
            const parsed = parseSseEvent(part);
            if (parsed) handleEvent(parsed);
          }
        }

        if (buffer.trim()) {
          const parsed = parseSseEvent(buffer);
          if (parsed) handleEvent(parsed);
        }

        await refreshThread();
        setStatus("Ready");
      }

      function parseSseEvent(chunk) {
        const lines = chunk.split("\n");
        let eventType = "message";
        let data = null;
        for (const line of lines) {
          if (line.startsWith("event:")) {
            eventType = line.slice(6).trim();
          }
          if (line.startsWith("data:")) {
            data = JSON.parse(line.slice(5));
          }
        }
        if (!data) return null;
        data._eventName = eventType;
        return data;
      }

      function handleEvent(event) {
        const line = document.createElement("div");
        line.className = "event-line";
        line.textContent = JSON.stringify(event);
        elements.eventsLog.prepend(line);

        if (event.type === "TEXT_MESSAGE_START") {
          state.activeAssistantMessageId = event.messageId;
          state.assistantNode = appendBubble("assistant", "");
        }

        if (event.type === "TEXT_MESSAGE_CONTENT" && state.assistantNode) {
          state.assistantNode.querySelector(".content").textContent += event.delta;
        }

        if (event.type === "RUN_ERROR") {
          appendBubble("assistant", `Error: ${event.message}`);
          setStatus("Error");
        }
      }

      function appendBubble(role, content) {
        const bubble = document.createElement("article");
        bubble.className = `bubble ${role}`;
        bubble.innerHTML = `
          <small>${role}</small>
          <div class="content"></div>
        `;
        bubble.querySelector(".content").textContent = content;
        elements.chatLog.appendChild(bubble);
        bubble.scrollIntoView({ behavior: "smooth", block: "end" });
        return bubble;
      }

      function setStatus(text) {
        elements.status.textContent = text;
      }
    </script>
  </body>
</html>
