services:
  postgres:
    image: postgres:16
    container_name: petrichor-postgres
    environment:
      POSTGRES_DB: petrichor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petrichor"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: petrichor-clickhouse
    environment:
      CLICKHOUSE_DB: petrichor
      CLICKHOUSE_USER: petrichor
      CLICKHOUSE_PASSWORD: petrichor
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.130.1
    container_name: petrichor-otel
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:13133/"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  clickhouse_data:
